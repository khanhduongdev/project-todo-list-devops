server {
    listen 80;
    server_name le-khanh-duong-k23.rikkei.edu.vn;

    # Cấu hình tối ưu theo yêu cầu đề bài
    client_max_body_size 10M;

    # Bật Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml image/svg+xml;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Hỗ trợ React Router
        try_files $uri $uri/ /index.html;
    }

    # Cấu hình Reverse Proxy cho Backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
